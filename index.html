<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>KitsuneID — Nonton Anime Sub Indo</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo"></a>
  <div class="nav-search">
    <svg class="si" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Cari anime..." id="searchInput" autocomplete="off"/>
  </div>
  <div class="nav-actions"><a href="profile.html" class="btn-login">Masuk</a></div>
</nav>
<div class="search-ov" id="searchOv"></div>

<div class="page mobile-page">
  <div class="m-search">
    <svg class="si" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Cari anime..." id="mSearchInput" autocomplete="off"/>
  </div>

  <!-- HERO -->
  <div class="hero anim" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-grad"></div>
    <div class="hero-body" id="heroBody">
      <div class="hero-badge">On Going</div>
      <h1 class="hero-title" id="heroTitle">Memuat...</h1>
      <div class="hero-meta" id="heroMeta"></div>
      <p class="hero-desc" id="heroDesc">Memuat sinopsis...</p>
      <div class="hero-btns">
        <a href="#" class="btn-p" id="heroWatch">Nonton</a>
        <a href="#" class="btn-s" id="heroDetail">Detail</a>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <!-- ONGOING -->
  <div class="sec anim anim-d1">
    <div class="sec-head">
      <div class="sec-title">On Going</div>
      <a href="ongoing.html" class="sec-link">Lihat Semua</a>
    </div>
    <div class="anime-grid" id="ongoingGrid">
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
    </div>
  </div>

  <!-- JADWAL HARI INI -->
  <div class="sec anim anim-d2">
    <div class="sec-head">
      <div class="sec-title">Jadwal Hari Ini</div>
      <a href="jadwal.html" class="sec-link">Semua Jadwal</a>
    </div>
    <div class="oc-grid" id="scheduleGrid">
      <p style="color:var(--muted);font-size:13px;grid-column:1/-1">Memuat jadwal...</p>
    </div>
  </div>

  <!-- ANIME SELESAI -->
  <div class="sec anim anim-d3">
    <div class="sec-head">
      <div class="sec-title">Anime Selesai</div>
      <a href="complete.html" class="sec-link">Lihat Semua</a>
    </div>
    <div class="anime-grid" id="completeGrid">
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk sk-txt"></div><div class="sk sk-txt2"></div></div>
    </div>
  </div>

  <div style="height:28px"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <div class="bnav-items">
    <a href="index.html" class="bnav-item active">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg>
      <span>Home</span>
    </a>
    <a href="jadwal.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Jadwal</span>
    </a>
    <a href="random.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
      <span>Random</span>
    </a>
    <a href="history.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span>Riwayat</span>
    </a>
    <a href="saved.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>Simpan</span>
    </a>
    <a href="profile.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Akun</span>
    </a>
  </div>
</nav>

<div class="toasts" id="toasts"></div>
<script src="js/main.js"></script>
<script src="js/home.js"></script>
</body>
</html>
>
