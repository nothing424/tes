<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Jadwal — KitsuneID</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo"></a>
  <div class="nav-actions" style="margin-left:auto"><a href="profile.html" class="btn-login">Masuk</a></div>
</nav>
<div class="page mobile-page">
  <div class="page-hd anim"><h1>Jadwal Rilis</h1><p>Jadwal tayang anime per hari</p></div>
  <div class="sec anim anim-d1"><div class="day-tabs" id="dayTabs"></div></div>
  <div class="sec anim anim-d2" id="scheduleContent"><p style="color:var(--muted);font-size:13px">Memuat jadwal...</p></div>
  <div style="height:24px"></div>
</div>
<nav class="bnav"><div class="bnav-items">
  <a href="index.html" class="bnav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg><span>Home</span></a>
  <a href="jadwal.html" class="bnav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>Jadwal</span></a>
  <a href="random.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg><span>Random</span></a>
  <a href="history.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>Riwayat</span></a>
  <a href="saved.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>Simpan</span></a>
  <a href="profile.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Akun</span></a>
</div></nav>
<div class="toasts" id="toasts"></div>
<script src="js/main.js"></script>
<script>
const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const todayIdx = new Date().getDay();
let allSchedules = [];
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await fetch('https://kitsuneid-api-production.up.railway.app/schedule');
    const d = await r.json();
    allSchedules = d.schedules || [];
    renderTabs(); showDay(todayIdx);
  } catch(e) { document.getElementById('scheduleContent').innerHTML='<p style="color:var(--muted);font-size:13px">Gagal memuat jadwal.</p>'; }
});
function renderTabs() {
  document.getElementById('dayTabs').innerHTML = days.map((day,i) =>
    `<button class="day-tab${i===todayIdx?' active':''}" onclick="showDay(${i})">${day}</button>`).join('');
}
function showDay(idx) {
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  const dayName = days[idx];
  const schedule = allSchedules.find(s => s.day?.toLowerCase().includes(dayName.toLowerCase()));
  const el = document.getElementById('scheduleContent');
  if (!schedule?.animeList?.length) {
    el.innerHTML=`<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><p>Tidak ada anime hari ${dayName}</p></div>`;
    return;
  }
  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px">${schedule.animeList.map(a=>`
    <a href="watch.html?slug=${encodeURIComponent(a.slug||'')}&ep=1" style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);transition:all .2s;color:inherit;text-decoration:none">
      <img src="${a.thumb||''}" alt="${a.title}"
        onerror="this.src='https://placehold.co/48x64/12121f/7c5cfc?text=?'"
        style="width:48px;height:64px;object-fit:cover;border-radius:6px;flex-shrink:0">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.title}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${a.episode && a.episode!='?' ? 'Ep '+a.episode : ''}</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </a>`).join('')}</div>`;
}
</script>
</body>
</html>
