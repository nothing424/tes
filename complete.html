<div class="toasts" id="toasts"></div>
<script src="js/main.js"></script>
<script>
let page = 1, loading = false;
async function loadMore() {
  if (loading) return; loading = true;
  const btn = document.getElementById('loadMoreBtn');
  if (btn) btn.textContent = 'Memuat...';
  try {
    const r = await fetch(`/api/complete?page=${page}`);
    const d = await r.json();
    if (!d.animes?.length) { if(btn) btn.style.display='none'; return; }
    const grid = document.getElementById('completeGrid');
    if (page === 1) grid.innerHTML = '';
    grid.innerHTML += d.animes.map(a => makeCard(a)).join('');
    page++;
    if (btn) { btn.style.display='flex'; btn.textContent='Muat Lebih Banyak'; }
  } catch(e) { if(btn) btn.textContent='Gagal, coba lagi'; }
  loading = false;
}
document.addEventListener('DOMContentLoaded', loadMore);
</script>
