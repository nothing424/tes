<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Tersimpan — KitsuneID</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo"></a>
  <div class="nav-actions" style="margin-left:auto"><span id="countBadge" style="font-size:12px;color:var(--text2)"></span></div>
</nav>
<div class="page mobile-page">
  <div class="page-hd anim"><h1>Anime Tersimpan</h1><p>Koleksi anime yang kamu simpan</p></div>
  <div class="sec anim anim-d1" id="savedContent"></div>
  <div style="height:24px"></div>
</div>
<nav class="bnav"><div class="bnav-items">
  <a href="index.html" class="bnav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg><span>Home</span></a>
  <a href="jadwal.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>Jadwal</span></a>
  <a href="random.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg><span>Random</span></a>
  <a href="history.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>Riwayat</span></a>
  <a href="saved.html" class="bnav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>Simpan</span></a>
  <a href="profile.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Akun</span></a>
</div></nav>
<div class="toasts" id="toasts"></div>
<script src="js/main.js"></script>
<script>
function renderSaved() {
  const saved = getLocal('savedAnimes') || [];
  document.getElementById('countBadge').textContent = saved.length ? `${saved.length} anime` : '';
  const el = document.getElementById('savedContent');
  if (!saved.length) {
    el.innerHTML=`<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><p>Belum ada anime tersimpan</p><small>Tekan ikon simpan di halaman detail anime</small></div>`;
    return;
  }
  el.innerHTML=`<div class="anime-grid">${saved.map(a=>`<div style="position:relative">${makeCard(a)}<button onclick="removeSaved('${a.slug}',event)" style="position:absolute;top:6px;right:6px;background:rgba(8,8,16,.85);border:1px solid var(--border);border-radius:6px;padding:4px 6px;cursor:pointer;color:var(--pink);font-size:11px;z-index:2">✕</button></div>`).join('')}</div>`;
}
function removeSaved(slug, e) {
  e.preventDefault(); e.stopPropagation();
  let saved = (getLocal('savedAnimes')||[]).filter(a=>a.slug!==slug);
  saveLocal('savedAnimes', saved); renderSaved(); showToast('Dihapus','success');
}
document.addEventListener('DOMContentLoaded', renderSaved);
</script>
</body>
</html>
