<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Riwayat — KitsuneID</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo"></a>
  <div class="nav-actions" style="margin-left:auto">
    <button onclick="clearHistory()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif">Hapus Semua</button>
  </div>
</nav>
<div class="page mobile-page">
  <div class="page-hd anim"><h1>Riwayat Nonton</h1><p>Anime yang pernah kamu tonton</p></div>
  <div class="sec anim anim-d1" id="historyContent"></div>
  <div style="height:24px"></div>
</div>
<nav class="bnav"><div class="bnav-items">
  <a href="index.html" class="bnav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg><span>Home</span></a>
  <a href="jadwal.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>Jadwal</span></a>
  <a href="random.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg><span>Random</span></a>
  <a href="history.html" class="bnav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>Riwayat</span></a>
  <a href="saved.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>Simpan</span></a>
  <a href="profile.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Akun</span></a>
</div></nav>
<div class="toasts" id="toasts"></div>
<script src="js/main.js"></script>
<script>
function timeAgo(ts) {
  if (!ts) return '';
  const m=Math.floor((Date.now()-ts)/60000), h=Math.floor(m/60), d=Math.floor(h/24);
  if (m<1) return 'Baru saja'; if (h<1) return `${m} menit lalu`; if (d<1) return `${h} jam lalu`; return `${d} hari lalu`;
}
function renderHistory() {
  const recent = getLocal('recentWatch') || [];
  const el = document.getElementById('historyContent');
  if (!recent.length) {
    el.innerHTML=`<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><p>Belum ada riwayat</p><small>Anime yang kamu tonton akan muncul di sini</small></div>`;
    return;
  }
  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:10px">${recent.map(a=>`
    <a href="watch.html?slug=${encodeURIComponent(a.slug)}&ep=${a.lastEp||1}" style="display:flex;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;align-items:center;color:inherit;transition:all .2s">
      <img src="${a.thumb||''}" style="width:50px;height:68px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--card2)" onerror="this.src='https://placehold.co/50x68/12121f/7c5cfc?text=?'">
      <div style="flex:1;min-width:0">
        <div style="font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.title}</div>
        <div style="font-size:12px;color:var(--accent);font-weight:600">Terakhir: Episode ${a.lastEp||1}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${timeAgo(a.timestamp)}</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M8 5v14l11-7z"/></svg>
    </a>`).join('')}</div>`;
}
function clearHistory() {
  if (!confirm('Hapus semua riwayat?')) return;
  saveLocal('recentWatch',[]); saveLocal('watchHistory',{});
  renderHistory(); showToast('Riwayat dihapus','success');
}
document.addEventListener('DOMContentLoaded', renderHistory);
</script>
</body>
</html>
