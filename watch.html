<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Nonton — KitsuneID</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>Kembali</a>
  <a href="index.html" class="logo" style="margin:0 auto"></a>
</nav>

<div class="watch-page">
  <!-- VIDEO PLAYER -->
  <div class="video-player-section">
    <div id="playerArea">
      <div class="video-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z"/></svg>
        <p>Pilih episode untuk mulai nonton</p>
      </div>
    </div>
  </div>

  <!-- INFO ANIME -->
  <div class="watch-info">
    <div class="watch-anime-row">
      <img class="watch-anime-thumb" id="watchThumb" src="" alt="">
      <div>
        <div class="watch-anime-title" id="watchTitle">Memuat...</div>
        <div class="watch-ep-meta"><span id="epMeta">Pilih Episode</span></div>
      </div>
    </div>
    <div class="watch-actions">
      <button class="watch-btn" onclick="sharePage()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>Bagikan
      </button>
      <button class="watch-btn" id="saveWatchBtn" onclick="toggleSaveAnime()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="saveWatchIcon"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span id="saveWatchText">Simpan</span>
      </button>
    </div>
  </div>

  <!-- SERVER -->
  <div class="server-section">
    <div class="server-label">Pilih Server</div>
    <div class="server-list" id="serverList">
      <span style="color:var(--muted);font-size:12px">Pilih episode dulu...</span>
    </div>
  </div>

  <!-- EP NAVIGASI -->
  <div class="ep-nav-section">
    <button class="btn-ep-nav disabled" id="prevBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> Sebelumnya
    </button>
    <button class="btn-ep-nav disabled" id="nextBtn">
      Selanjutnya <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <!-- EPISODE LIST -->
  <div class="ep-list-section">
    <div class="ep-list-label">Daftar Episode</div>
    <div class="ep-scroll" id="epPills">
      <div style="color:var(--muted);font-size:12px;padding:8px">Memuat episode...</div>
    </div>
  </div>

  <!-- SINOPSIS -->
  <div class="watch-synopsis">
    <div class="watch-synopsis-title">Sinopsis</div>
    <p class="watch-synopsis-text" id="watchSynopsis">Memuat sinopsis...</p>
  </div>

  <div style="height:16px"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <div class="bnav-items">
    <a href="index.html" class="bnav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg><span>Home</span></a>
    <a href="jadwal.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>Jadwal</span></a>
    <a href="random.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg><span>Random</span></a>
    <a href="history.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>Riwayat</span></a>
    <a href="saved.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>Simpan</span></a>
    <a href="profile.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Akun</span></a>
  </div>
</nav>

<div class="toasts" id="toasts"></div>
<script src="js/main.js"></script>
<script src="js/watch.js"></script>
<script>
function sharePage() {
  if (navigator.share) {
    navigator.share({ title: document.getElementById('watchTitle')?.textContent, url: location.href });
  } else {
    navigator.clipboard?.writeText(location.href);
    showToast('Link disalin!', 'success');
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const slug = getParam('slug');
  if (slug) document.getElementById('detailLink').href = `anime.html?slug=${encodeURIComponent(slug)}`;
});
</script>
</body>
</html>
